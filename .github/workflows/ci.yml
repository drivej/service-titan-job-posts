name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            service/package-lock.json
            sevalla/package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install worker dependencies
        run: npm ci --prefix sevalla

      - name: Install hosted service dependencies
        run: npm ci --prefix service

      - name: Validate
        run: sh scripts/validate.sh
